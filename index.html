<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Les États de Conscience — Résumé Psycho</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #f0f0f0;
      padding-bottom: 60px;
    }

    /* HEADER */
    header {
      text-align: center;
      padding: 40px 20px 30px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    header .subtitle {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #a0c4ff;
      margin-bottom: 10px;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      background: linear-gradient(90deg, #a0c4ff, #bdb2ff, #ffd6a5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    header p {
      color: #8899aa;
      font-size: 15px;
    }

    /* MAIN */
    main {
      max-width: 900px;
      margin: 32px auto 0;
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* ACCORDION CARD */
    .card {
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      transition: border-color 0.25s;
    }
    .card.open {
      border-color: var(--c);
    }

    .card-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 22px;
      background: transparent;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: background 0.25s;
    }
    .card.open .card-btn {
      background: linear-gradient(90deg, color-mix(in srgb, var(--c) 15%, transparent), transparent);
    }

    .card-emoji { font-size: 28px; }

    .card-title {
      font-weight: 700;
      font-size: clamp(1rem, 2.5vw, 1.18rem);
      color: #e0e0e0;
      flex: 1;
      transition: color 0.25s;
    }
    .card.open .card-title { color: var(--cl); }

    .card-arrow {
      font-size: 20px;
      color: #666;
      transition: transform 0.25s, color 0.25s;
      display: inline-block;
    }
    .card.open .card-arrow {
      transform: rotate(180deg);
      color: var(--cl);
    }

    /* CONTENT */
    .card-body {
      display: none;
      padding: 0 22px 22px;
    }
    .card.open .card-body { display: block; }

    .item {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--c) 12%, transparent);
      border-left: 3px solid var(--c);
    }
    .item-label {
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--cl);
      margin-bottom: 6px;
    }
    .item-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: #d0d8e8;
    }
    .item-text .break { display: block; margin-top: 8px; }

    /* FOOTER */
    footer {
      text-align: center;
      margin-top: 40px;
      color: #667788;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <div class="subtitle">3e Année Gymnase OC · Psycho-Pédagogie · Fribourg</div>
  <h1>Les États de Conscience</h1>
  <p>Clique sur une section pour la développer · Résumé complet pour l'évaluation</p>
</header>

<main id="accordion"></main>

<footer>✦ Bonne chance pour ton éval ! ✦</footer>

<script>
const sections = [
  {
    id: "circadien", emoji: "🕐", title: "Rythmes Circadiens",
    color: "#2D6A4F", light: "#D8F3DC",
    content: [
      { sub: "Définition", text: "Rythme de variation des fonctions physiologiques (température, FC, appétit…) sur ~24h. Innés, se synchronisent après la naissance." },
      { sub: "Centre de contrôle", text: "Noyau suprachiasmatique (NSC) dans l'hypothalamus → glande pinéale → sécrète la mélatonine («hormone du sommeil») selon jour/nuit." },
      { sub: "Syndrome dépression saisonnière (SAD)", text: "État dépressif lié à la réduction d'ensoleillement en automne/hiver. Disparaît quand les journées rallongent." },
      { sub: "Travail de nuit & décalage horaire", text: "La «nuit subjective» = période où la T° corporelle est au plus bas et l'horloge biologique dit de dormir. Effets : sommeil fragmenté, insomnie, somnolence, risque dépressif, troubles gastro-intestinaux. Aide jet-lag : s'exposer à la lumière tôt le matin." }
    ]
  },
  {
    id: "sommeil", emoji: "💤", title: "Le Sommeil",
    color: "#1B4F72", light: "#D6EAF8",
    content: [
      { sub: "Deux types de sommeil", text: "SOMMEIL LENT : ralentissement cérébral, FC/resp. basses et régulières, tension artérielle basse.||SOMMEIL PARADOXAL : activité cérébrale intense (ondes bêta), FC/resp. rapides et irrégulières, mouvements oculaires rapides (REM), paralysie des muscles longs." },
      { sub: "Stades", text: "Éveil → Ondes bêta | Hypnagogique → Ondes alpha | Stade 1 → transition, ondes irrégulières + alpha | Stade 2 → «ondes en fuseaux», ~50% de la nuit | Stade 3 → 20% ondes delta | Stade 4 → 50–100% delta, sommeil le plus profond | Sommeil paradoxal → ondes bêta (comme l'éveil)" },
      { sub: "Pourquoi dort-on ?", text: "Théorie de la récupération : le sommeil restaure l'équilibre physiologique (homéostasie).||Théorie circadienne : chez nos ancêtres, le sommeil permettait d'éviter les dangers nocturnes." },
      { sub: "Fonctions du sommeil", text: "Rôle conjoint sommeil lent + paradoxal dans la consolidation de la mémoire. Microsommeil = épisodes involontaires d'endormissement très brefs (surtout en privation de sommeil)." },
      { sub: "Évolution avec l'âge", text: "Plus on vieillit, moins on dort : diminution du sommeil lent profond et paradoxal, augmentation des réveils nocturnes et de la latence d'endormissement." }
    ]
  },
  {
    id: "reves", emoji: "🌙", title: "Les Rêves",
    color: "#6C3483", light: "#EBD5F7",
    content: [
      { sub: "Rêves paradoxal vs lent", text: "Sommeil paradoxal : rêves vivants, narratifs, émotionnels, souvent oubliés au réveil.||Sommeil lent : rêves plus flous, pensées fragmentées, moins cohérents." },
      { sub: "Théorie freudienne", text: "Les rêves révèlent des désirs inconscients refoulés enracinés dans la vie infantile. Contenu «manifeste» (apparent) vs contenu «latent» (symbolique). Les rêves sont la «voie royale vers l'inconscient»." },
      { sub: "Théories modernes", text: "Psychologiques : les rêves traitent les émotions et résolvent les problèmes.||Évolutionnistes : simulation de menaces pour s'entraîner à réagir.||Neuroscientifiques : tentatives du cerveau de donner sens aux activations neuronales aléatoires → lien avec la consolidation mémorielle." }
    ]
  },
  {
    id: "troubles", emoji: "⚠️", title: "Troubles du Sommeil",
    color: "#B7391B", light: "#FDECEA",
    content: [
      { sub: "Parasomnies", text: "Comportements d'éveil survenant pendant le sommeil.||Somnambulisme : stade 4, éveil partiel, marcher/agir en dormant.||Terreur nocturne : stade 4, cri perçant, état de panique, FC élevée.||Cauchemar : sommeil paradoxal, rêve terrifiant.||Somniloquie : parler pendant son sommeil." },
      { sub: "Insomnie", text: "Touche 1/3 des adultes. Transitoire (<3 sem.) : décalage horaire, stress émotionnel, maladie courte. Chronique (mois/années) : ~10% adultes, liée à problème médical/psychologique. Conséquences : détresse, fatigue, accidents, maladies." },
      { sub: "Apnée du sommeil", text: "Interruption respiratoire >10 sec., plusieurs fois/nuit → réveils partiels répétés. Cas graves : jusqu'à 800 éveils/nuit → lésions cérébrales, hypertension, troubles cardiaques. Traitement : hygiène de vie (cas léger) ou CPAP – ventilation en pression positive continue (cas grave)." },
      { sub: "Narcolepsie", text: "Incurable. 1/2000. Somnolence diurne excessive + attaques de sommeil paradoxal (10–20 min). Déclenchée par situations banales ou émotions fortes (rire, colère, surprise). Cause : anomalie cérébrale/génétique. Traitement : médicaments éveillants + siestes planifiées." }
    ]
  },
  {
    id: "psychotropes", emoji: "💊", title: "Les Psychotropes",
    color: "#784212", light: "#FDEBD0",
    content: [
      { sub: "Définition", text: "Toute substance modifiant l'état de conscience, l'humeur, la perception ou la pensée via la biochimie du SNC (neurotransmetteurs). Agissent sur le circuit plaisir-récompense (dopamine)." },
      { sub: "Facteurs de risque d'abus", text: "Neurobiologiques : stimulation du noyau accumbens, effet sur le cortex orbitofrontal.||Hérédité : métabolisme de l'alcool, vulnérabilités biologiques.||Psychosociaux : impulsivité, stress, santé mentale, influence des pairs, problèmes sociaux." },
      { sub: "Dépendance physique", text: "Usage répété → tolérance (adaptation de l'organisme) + symptômes de sevrage (opposés aux effets du produit)." },
      { sub: "Dépendance psychologique", text: "Désir irrépressible de ressentir les effets. Plus difficile à combattre que la dépendance physique. Rôle du conditionnement (apprentissage par association)." },
      { sub: "4 facteurs du potentiel addictif", text: "1. Vitesse à laquelle les effets se font sentir||2. Intensité du plaisir ou soulagement procuré||3. Durée des effets agréables||4. Intensité du malaise lors du sevrage" }
    ]
  },
  {
    id: "stimulants", emoji: "⚡", title: "Stimulants du SNC",
    color: "#1A5276", light: "#D1F2EB",
    content: [
      { sub: "Mécanisme général", text: "Augmentent l'activité du SNC, réduisent la fatigue, donnent l'impression d'être plus alerte. Imitent les effets de l'adrénaline/noradrénaline (système sympathique)." },
      { sub: "Caféine", text: "Bloque les récepteurs à l'adénosine (substance qui induit la somnolence). Légale et très répandue. Dépendance légère possible (maux de tête au sevrage)." },
      { sub: "Cocaïne", text: "Bloque la recapture de dopamine et sérotonine → euphorie intense mais brève. Très addictive. Effets : euphorie, confiance, énergie → puis crash, paranoïa, dépression." },
      { sub: "Amphétamines / MDMA (Ecstasy)", text: "Libèrent massivement dopamine et sérotonine. Ecstasy : empathie, énergie, distorsion du temps → neurotoxicité possible à long terme. Risques : déshydratation, hyperthermie, dépression post-consommation." }
    ]
  },
  {
    id: "depresseurs", emoji: "🌊", title: "Dépresseurs du SNC",
    color: "#2C3E50", light: "#D5DBDB",
    content: [
      { sub: "Mécanisme général", text: "Diminuent l'activité du SNC, ralentissent les fonctions physiologiques, réduisent la sensibilité aux stimuli extérieurs. Contribuent à réduire l'anxiété. Combinés = effets cumulatifs dangereux." },
      { sub: "Alcool", text: "Premiers verres → détente, désinhibition. Plus l'alcoolémie monte, plus le SNC dysfonctionne.||0,05 : jugement amoindri, inhibitions réduites.||0,10 : réactions lentes, fonctions motrices réduites.||0,15 : bouche pâteuse, impulsivité.||0,30 : stupeur, incapacité à comprendre l'environnement.||0,40+ : perte de conscience, arrêt cardiorespiratoire possible." },
      { sub: "Benzodiazépines (BZD)", text: "Ex : Valium, Xanax, Rohypnol. Potentialisent le GABA (neurotransmetteur inhibiteur). Utilisées contre l'anxiété et l'insomnie. Très addictives, sevrage difficile et potentiellement dangereux." },
      { sub: "Opiacés / Narcotiques", text: "Ex : héroïne, morphine, codéine, fentanyl. Se lient aux récepteurs opioïdes → analgésie intense + euphorie. Dépendance physique et psychologique très forte. Overdose = dépression respiratoire mortelle." },
      { sub: "Kétamine", text: "Anesthésique dissociatif. Bloque les récepteurs NMDA (glutamate). Effets : dissociation, hallucinations, analgésie. Utilisée en médecine et en contexte festif. Risques : troubles cognitifs, dépendance, coma à forte dose." }
    ]
  },
  {
    id: "hallucinogenes", emoji: "🔮", title: "Perturbateurs du SNC (Hallucinogènes)",
    color: "#7D3C98", light: "#F5EEF8",
    content: [
      { sub: "Mécanisme général", text: "Perturbent les perceptions du temps et de l'espace, altèrent les émotions, produisent des hallucinations. Modifient l'humeur selon l'état d'esprit de l'usager (set & setting)." },
      { sub: "Cannabis", text: "Formes : marijuana, haschich, huile, résine. Effets : bien-être, détente, hypersensibilité sensorielle, distorsion temporelle, ralentissement des réflexes. Durée : <4h pour effets principaux, certains effets cognitifs/moteurs persistent 5–12h. Légalisé dans certains pays." },
      { sub: "LSD", text: "Puissant hallucinogène de synthèse. Agit sur les récepteurs à la sérotonine (5-HT2A). Effets : hallucinations visuelles intenses, distorsion spatiotemporelle, expériences mystiques ou paniques (bad trip). Durée : 8–12h. Pas physiquement addictif mais psychologiquement marquant." },
      { sub: "MDMA / Ecstasy", text: "Stimulant et empathogène. Libère massivement sérotonine, dopamine, noradrénaline. Sentiment d'amour universel, énergie, euphorie. Risques : hyperthermie, déshydratation (ou hyperhydratation), neurotoxicité sérotoninergique à long terme." }
    ]
  }
];

const accordion = document.getElementById('accordion');

sections.forEach(s => {
  const card = document.createElement('div');
  card.className = 'card';
  card.id = s.id;
  card.style.setProperty('--c', s.color);
  card.style.setProperty('--cl', s.light);

  // Button
  const btn = document.createElement('button');
  btn.className = 'card-btn';
  btn.innerHTML = `
    <span class="card-emoji">${s.emoji}</span>
    <span class="card-title">${s.title}</span>
    <span class="card-arrow">▾</span>
  `;

  // Body
  const body = document.createElement('div');
  body.className = 'card-body';

  s.content.forEach(item => {
    const div = document.createElement('div');
    div.className = 'item';

    const parts = item.text.split('||');
    const textHtml = parts.map((p, i) =>
      i === 0 ? p : `<span class="break">${p}</span>`
    ).join('');

    div.innerHTML = `<div class="item-label">${item.sub}</div><div class="item-text">${textHtml}</div>`;
    body.appendChild(div);
  });

  // Toggle
  btn.addEventListener('click', () => {
    const isOpen = card.classList.contains('open');
    // Close all
    document.querySelectorAll('.card.open').forEach(c => c.classList.remove('open'));
    if (!isOpen) card.classList.add('open');
  });

  card.appendChild(btn);
  card.appendChild(body);
  accordion.appendChild(card);
});
</script>
</body>
</html>
